<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo - TanStack Direction</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #101a2f;
      --panel-2: #111c34;
      --line: #233250;
      --text: #e7eefc;
      --muted: #8da2c8;
      --brand: #38bdf8;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif;
      background: radial-gradient(circle at 15% 0%, #1e293b, #0b1220 45%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    h1 { margin: 0; font-size: 24px; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .back-link {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #334155;
      padding: 0 12px;
      font-weight: 600;
      color: #d9e5fc;
      background: #142541;
      white-space: nowrap;
    }
    .layout {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 12px;
    }
    .policy {
      margin-top: 10px;
      font-size: 12px;
      color: #c7d7f5;
      background: #13203a;
      border: 1px solid #2a3f66;
      border-radius: 10px;
      padding: 8px 10px;
      line-height: 1.6;
    }
    .boundary {
      margin-top: 10px;
      font-size: 12px;
      color: #c7d7f5;
      background: #111c34;
      border: 1px solid #2a3f66;
      border-radius: 10px;
      padding: 8px 10px;
      line-height: 1.6;
    }
    .card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 12px;
      overflow: hidden;
    }
    .card .hd {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      color: #b5c4e4;
      letter-spacing: .3px;
    }
    .panel { padding: 12px; }
    .cols { display: grid; gap: 8px; }
    .cols label { display: flex; gap: 8px; align-items: center; color: #d7e4ff; font-size: 13px; }
    .chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid #334155;
      background: #152441;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
      color: #c6d4ef;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      border-bottom: 1px solid #20314f;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }
    th {
      color: #cfe0ff;
      background: var(--panel-2);
      user-select: none;
      cursor: pointer;
    }
    tr:hover td { background: #13203a; }
    .num { text-align: right; }
    .progress {
      height: 8px;
      border-radius: 999px;
      background: #1e293b;
      overflow: hidden;
    }
    .bar { height: 100%; }
    .good { background: var(--good); }
    .warn { background: var(--warn); }
    .bad { background: var(--bad); }
    .muted { color: var(--muted); font-size: 12px; }
    .toolbar { margin-bottom: 10px; display: flex; justify-content: space-between; gap: 8px; }
    input[type="search"] {
      width: 260px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #31466c;
      background: #0f1a30;
      color: #e7eefc;
      padding: 0 10px;
    }
    button {
      height: 34px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #142541;
      color: #d9e5fc;
      padding: 0 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .state-box {
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
    }
    .state-loading { color: #bfdbfe; background: #1e3a5f; border-color: #3b82f6; }
    .state-empty { color: #fde68a; background: #3f2d12; border-color: #f59e0b; }
    .state-error { color: #fecaca; background: #4c1d1d; border-color: #ef4444; }
    .hidden { display: none; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .table-wrap { overflow: auto; }
      table { min-width: 760px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>TanStack Table 方向 Demo</h1>
        <div class="sub">侧重点：高度定制（列显隐、排序、选中、单元格渲染）</div>
      </div>
      <a href="index.html" class="back-link">返回总览</a>
    </div>

    <div id="baseInfo"></div>

    <section class="layout">
      <aside class="card">
        <div class="hd">列控制 / 交互开关</div>
        <div class="panel">
          <div class="cols" id="columns"></div>
          <div style="margin-top:12px" class="muted">提示：点表头可排序；可组合成多种定制布局。</div>
        </div>
      </aside>

      <section class="card">
        <div class="panel">
          <div class="toolbar">
            <input id="q" type="search" placeholder="搜索客户/行业" />
            <div>
              <button id="clear">清除筛选</button>
              <button id="mockLoading">加载态</button>
              <button id="mockError">错误态</button>
              <button id="mockRecover">恢复</button>
            </div>
          </div>
          <div id="stateBox" class="state-box hidden" role="status" aria-live="polite"></div>
          <div id="activeFilters" style="margin-bottom: 8px"></div>
          <div class="table-wrap">
            <table>
              <thead><tr id="thead"></tr></thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="table-demo-base.js"></script>
  <script>
    const rows = [
      { customer: '星河零售', industry: '快消', mrr: 52000, risk: 0.12, health: 0.88 },
      { customer: '远航物流', industry: '物流', mrr: 36000, risk: 0.34, health: 0.66 },
      { customer: '光谱科技', industry: '科技', mrr: 78000, risk: 0.08, health: 0.93 },
      { customer: '辰光医疗', industry: '医疗', mrr: 41000, risk: 0.27, health: 0.72 },
      { customer: '云舟教育', industry: '教育', mrr: 25000, risk: 0.46, health: 0.54 },
      { customer: '九州制造', industry: '制造', mrr: 63000, risk: 0.18, health: 0.81 }
    ];

    const columns = [
      { key: 'pick', title: '', visible: true, sortable: false },
      { key: 'customer', title: '客户', visible: true, sortable: true },
      { key: 'industry', title: '行业', visible: true, sortable: true },
      { key: 'mrr', title: 'MRR', visible: true, sortable: true },
      { key: 'risk', title: '流失风险', visible: true, sortable: true },
      { key: 'health', title: '健康度', visible: true, sortable: true }
    ];

    let selected = new Set();
    let sort = { key: 'mrr', desc: true };
    let keyword = '';
    let mockState = 'ready';
    const base = window.TableDemoBase.create({
      infoContainerId: 'baseInfo',
      stateBoxId: 'stateBox',
      unit: '行',
      amountLabel: '当前数据量',
      thresholds: [
        { max: 500, label: '前端排序/筛选' },
        { max: 2000, label: '分页' },
        { max: 10000, label: '虚拟化' },
        { label: '服务端查询' }
      ],
      boundaryText: '图表负责趋势与对比讲述；本表格负责列级自定义、筛选、选择与精确值核对。'
    });

    function visibleCols() {
      return columns.filter((c) => c.visible);
    }

    function pct(v) {
      return (v * 100).toFixed(0) + '%';
    }

    function ariaSortValue(key) {
      if (!key || sort.key !== key) return 'none';
      return sort.desc ? 'descending' : 'ascending';
    }

    function renderColumnsControl() {
      const box = document.getElementById('columns');
      box.innerHTML = columns.map((c) => `
        <label>
          <input type="checkbox" data-key="${c.key}" ${c.visible ? 'checked' : ''} />
          <span>${c.title || '选择列'}</span>
        </label>
      `).join('');

      box.querySelectorAll('input[type="checkbox"]').forEach((el) => {
        el.addEventListener('change', () => {
          const col = columns.find((c) => c.key === el.dataset.key);
          if (col) col.visible = el.checked;
          render();
        });
      });
    }

    function barClass(v) {
      if (v >= 0.8) return 'good';
      if (v >= 0.6) return 'warn';
      return 'bad';
    }

    function filteredRows() {
      let list = [...rows];
      if (keyword) {
        list = list.filter((r) => r.customer.includes(keyword) || r.industry.includes(keyword));
      }
      if (sort.key) {
        list.sort((a, b) => {
          const av = a[sort.key];
          const bv = b[sort.key];
          if (av === bv) return 0;
          if (sort.desc) return av < bv ? 1 : -1;
          return av > bv ? 1 : -1;
        });
      }
      return list;
    }

    function renderHeader() {
      const thead = document.getElementById('thead');
      thead.innerHTML = visibleCols().map((c) => {
        if (!c.sortable) return `<th aria-sort="none">${c.title}</th>`;
        const mark = sort.key === c.key ? (sort.desc ? ' ↓' : ' ↑') : '';
        return `<th data-key="${c.key}" aria-sort="${ariaSortValue(c.key)}">${c.title}${mark}</th>`;
      }).join('');

      thead.querySelectorAll('th[data-key]').forEach((th) => {
        th.addEventListener('click', () => {
          const key = th.dataset.key;
          if (sort.key === key) sort.desc = !sort.desc;
          else sort = { key, desc: false };
          render();
        });
      });
    }

    function renderBody() {
      const tbody = document.getElementById('tbody');
      const list = filteredRows();
      const cols = visibleCols();
      if (mockState === 'loading') {
        tbody.innerHTML = '';
        base.setState('loading', '加载中：正在获取客户列表...');
        return;
      }
      if (mockState === 'error') {
        tbody.innerHTML = '';
        base.setState('error', '加载失败：请重试或检查数据接口。');
        return;
      }
      if (!list.length) {
        tbody.innerHTML = '';
        base.setState('empty', '暂无匹配客户，请调整筛选条件。');
        return;
      }
      base.setState('ready');

      tbody.innerHTML = list.map((r, idx) => {
        const tds = cols.map((c) => {
          if (c.key === 'pick') {
            return `<td><input type="checkbox" data-customer="${r.customer}" ${selected.has(r.customer) ? 'checked' : ''} /></td>`;
          }
          if (c.key === 'mrr') {
            return `<td class="num">¥ ${r.mrr.toLocaleString('zh-CN')}</td>`;
          }
          if (c.key === 'risk') {
            return `<td><div>${pct(r.risk)}</div><div class="progress"><div class="bar ${barClass(1-r.risk)}" style="width:${(1-r.risk)*100}%"></div></div></td>`;
          }
          if (c.key === 'health') {
            return `<td><div>${pct(r.health)}</div><div class="progress"><div class="bar ${barClass(r.health)}" style="width:${r.health*100}%"></div></div></td>`;
          }
          return `<td>${r[c.key]}</td>`;
        }).join('');
        return `<tr>${tds}</tr>`;
      }).join('');

      tbody.querySelectorAll('input[type="checkbox"]').forEach((el) => {
        el.addEventListener('change', () => {
          const name = el.dataset.customer;
          if (el.checked) selected.add(name); else selected.delete(name);
          renderFilters();
        });
      });
    }

    function renderFilters() {
      const list = [];
      if (keyword) list.push(`关键词：${keyword}`);
      if (selected.size) list.push(`已选客户：${Array.from(selected).join('、')}`);
      if (sort.key) list.push(`排序：${sort.key} ${sort.desc ? 'DESC' : 'ASC'}`);

      document.getElementById('activeFilters').innerHTML = list.length
        ? list.map((i) => `<span class="chip">${i}</span>`).join('')
        : '<span class="chip">无筛选条件</span>';
    }

    function render() {
      base.updateScaleHint(rows.length);
      renderColumnsControl();
      renderHeader();
      renderBody();
      renderFilters();
    }

    document.getElementById('q').addEventListener('input', (e) => {
      mockState = 'ready';
      keyword = e.target.value.trim();
      render();
    });

    document.getElementById('clear').addEventListener('click', () => {
      mockState = 'ready';
      keyword = '';
      selected = new Set();
      sort = { key: 'mrr', desc: true };
      document.getElementById('q').value = '';
      render();
    });

    document.getElementById('mockLoading').addEventListener('click', () => {
      mockState = 'loading';
      render();
      setTimeout(() => {
        if (mockState === 'loading') {
          mockState = 'ready';
          render();
        }
      }, 800);
    });

    document.getElementById('mockError').addEventListener('click', () => {
      mockState = 'error';
      render();
    });

    document.getElementById('mockRecover').addEventListener('click', () => {
      mockState = 'ready';
      render();
    });

    render();
  </script>
</body>
</html>
